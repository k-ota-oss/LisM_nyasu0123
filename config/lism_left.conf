# =========================
# Split（left = peripheral）
# =========================
CONFIG_ZMK_SPLIT=y


# =========================
# Sleep
# =========================
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000


# =========================
# Battery（最低限）
# =========================
CONFIG_BT_BAS=y
CONFIG_ZMK_BATTERY_REPORTING=y


# =========================
# Encoder（最重要）
# =========================
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y


# =========================
# Debug（必要なときだけON）
# =========================
#CONFIG_ZMK_LOG_LEVEL_DBG=y
