# Split
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# USB
CONFIG_ZMK_USB=y

# Sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Battery
CONFIG_BT_BAS=y
CONFIG_ZMK_BATTERY_REPORTING=y

# Mouse
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y

# Studio
CONFIG_ZMK_STUDIO=y

# Charge Indicator
CONFIG_CHARGE_INDICATOR=y
